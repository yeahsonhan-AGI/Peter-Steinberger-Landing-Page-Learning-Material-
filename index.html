<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter Steinberger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background-color: #fefefe;
            color: #1a1a1a;
            line-height: 1.8;
            font-size: 19px;
            font-weight: 300;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle paper texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(0,0,0,0.008) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(0,0,0,0.006) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 80px 40px 120px;
        }

        .header {
            margin-bottom: 80px;
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 30px;
            overflow: hidden;
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%);
            transition: filter 0.5s ease, transform 0.5s ease;
        }

        .avatar:hover img {
            filter: grayscale(0%);
            transform: scale(1.03);
        }

        .avatar::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
            pointer-events: none;
        }

        .name {
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #666;
        }

        .content-section {
            margin-bottom: 60px;
        }

        .section-label {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 20px;
        }

        .text {
            font-size: 19px;
            line-height: 1.9;
            color: #2a2a2a;
        }

        .text p {
            margin-bottom: 1.2em;
        }

        /* Link styling */
        .link {
            display: inline-block;
            position: relative;
            color: #1a1a1a;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .link::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 100%;
            height: 1px;
            background: #1a1a1a;
            transform-origin: left;
            transform: scaleX(1);
        }

        /* Cool hover animation - back and forth shimmer */
        .link:hover {
            color: #000;
        }

        .link:hover::after {
            animation: shimmer 0.6s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% {
                transform: scaleX(1);
                opacity: 1;
            }
            25% {
                transform: scaleX(0.7);
                opacity: 0.5;
            }
            50% {
                transform: scaleX(1.05);
                opacity: 1;
            }
            75% {
                transform: scaleX(0.85);
                opacity: 0.7;
            }
        }

        /* Page transition */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            transform: translateX(100%);
            z-index: 9999;
            pointer-events: none;
        }

        .page-transition.active {
            animation: slideTransition 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        @keyframes slideTransition {
            0% {
                transform: translateX(100%);
            }
            50% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        /* Fade in animation for page content */
        .fade-in {
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 10px;
        }

        .nav-item {
            font-size: 17px;
        }

        .footer {
            margin-top: 100px;
            padding-top: 40px;
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        .footer-text {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: #888;
        }

        .social-link {
            color: #888;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .social-link:hover {
            color: #1a1a1a;
        }

        /* External link indicator */
        .external-link {
            position: relative;
            padding-right: 18px;
        }

        .external-link::before {
            content: '↗';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .external-link:hover::before {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .container {
                padding: 60px 24px 80px;
            }

            .avatar {
                width: 100px;
                height: 100px;
                margin-bottom: 24px;
            }

            .name {
                font-size: 32px;
            }

            .text {
                font-size: 17px;
            }

            .nav-links {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="page-transition" id="pageTransition"></div>

    <div class="container fade-in">
        <header class="header">
            <div class="avatar">
                <img src="https://github.com/steipete.png" alt="Peter Steinberger">
            </div>
            <h1 class="name">Peter Steinberger</h1>
            <p class="subtitle">Austria · Vienna</p>
        </header>

        <section class="content-section">
            <p class="text">
                Austrian developer and entrepreneur. Creator of <a href="about.html" class="link">OpenClaw</a>,
                founder of <a href="pspdfkit.html" class="link">PSPDFKit</a>, and now working on
                <a href="openai.html" class="link">next-generation personal agents</a> at OpenAI.
            </p>
        </section>

        <section class="content-section">
            <p class="section-label">Explore</p>
            <nav class="nav-links">
                <span class="nav-item"><a href="about.html" class="link">About</a></span>
                <span class="nav-item"><a href="pspdfkit.html" class="link">PSPDFKit</a></span>
                <span class="nav-item"><a href="openclaw.html" class="link">OpenClaw</a></span>
                <span class="nav-item"><a href="openai.html" class="link">OpenAI</a></span>
                <span class="nav-item"><a href="videos.html" class="link">Videos & Talks</a></span>
                <span class="nav-item"><a href="contact.html" class="link">Contact</a></span>
            </nav>
        </section>

        <footer class="footer">
            <p class="footer-text">
                <a href="https://x.com/steipete" target="_blank" class="social-link external-link">X/Twitter</a> ·
                <a href="https://github.com/steipete" target="_blank" class="social-link external-link">GitHub</a> ·
                <a href="https://steipete.me" target="_blank" class="social-link external-link">Blog</a>
            </p>
        </footer>
    </div>

    <script>
        document.querySelectorAll('.link').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href.endsWith('.html')) {
                    e.preventDefault();
                    const transition = document.getElementById('pageTransition');
                    transition.classList.add('active');

                    setTimeout(() => {
                        window.location.href = href;
                    }, 400);
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background-color: #fefefe;
            color: #1a1a1a;
            line-height: 1.8;
            font-size: 19px;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .error-code {
            font-family: 'Inter', sans-serif;
            font-size: 120px;
            font-weight: 300;
            color: #ddd;
            line-height: 1;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 32px;
            font-weight: 300;
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 18px;
            color: #666;
            margin-bottom: 32px;
        }

        .home-link {
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #1a1a1a;
            text-decoration: none;
            padding: 12px 24px;
            border: 1px solid #1a1a1a;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #1a1a1a;
            color: #fff;
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 80px;
            }

            .error-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">This page doesn't exist or has been moved.</p>
        <a href="index.html" class="home-link">Return Home</a>
    </div>
</body>
</html>
